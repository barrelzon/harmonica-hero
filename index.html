<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero PRO MAX</title>
<style>
body {
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas {
    display:block;
    margin:auto;
    background:#111;
}

#controls {
    padding:10px;
}

#progressBar {
    width:80%;
    height:10px;
    background:#222;
    margin:10px auto;
}
#progress {
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>
<body>

<h2>🎵 Harmonica Hero PRO MAX</h2>

<div id="controls">
<button onclick="start()">Start</button>
<label>Offset:
<input type="range" min="-0.5" max="0.5" step="0.01" value="0" id="offsetSlider">
</label>
</div>

<canvas id="waveCanvas" width="700" height="100"></canvas>
<canvas id="gameCanvas" width="700" height="600"></canvas>

<div id="progressBar"><div id="progress"></div></div>

<div>
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span> |
Accuracy: <span id="accuracy">0%</span>
</div>

<div id="feedback"></div>

<script>
// ===== SETUP =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const waveCanvas = document.getElementById("waveCanvas");
const wctx = waveCanvas.getContext("2d");

const hitY = canvas.height - 100;
const laneWidth = canvas.width / 10;
const speed = 240;

let audioCtx, analyser, dataArray;
let backingAudio;

let offset = 0;
document.getElementById("offsetSlider").oninput = e=>{
    offset = parseFloat(e.target.value);
};

let score=0, combo=0, hits=0, total=0;

// ===== HARMONICA MAP =====
const harmonicaMap = [
{hole:4,type:"blow",freq:523.3},
{hole:4,type:"draw",freq:587.3},
{hole:5,type:"blow",freq:659.3},
{hole:5,type:"draw",freq:698.5},
{hole:6,type:"blow",freq:784.0},
{hole:6,type:"draw",freq:880.0}
];

// ===== SONG =====
const song = {
audio:"ode.mp3",
notes:[
{hole:4,type:"blow",time:0,duration:0.6},
{hole:5,type:"blow",time:1,duration:0.6},
{hole:6,type:"blow",time:2,duration:0.6}
]
};

// ===== MIC =====
async function initMic(){
audioCtx = new AudioContext();
const stream = await navigator.mediaDevices.getUserMedia({audio:true});
const source = audioCtx.createMediaStreamSource(stream);

analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;

source.connect(analyser);
dataArray = new Float32Array(analyser.fftSize);
}

// ===== PITCH =====
function getPitch(){
analyser.getFloatTimeDomainData(dataArray);

let bestOffset=-1,bestCorrelation=0;

for(let o=8;o<1000;o++){
let c=0;
for(let i=0;i<1000;i++){
c+=dataArray[i]*dataArray[i+o];
}
c/=1000;
if(c>bestCorrelation){
bestCorrelation=c;
bestOffset=o;
}
}

if(bestCorrelation>0.01){
return audioCtx.sampleRate/bestOffset;
}
return null;
}

// ===== NOTE DETECT =====
function detect(freq){
if(!freq)return null;

let best=null,min=999;

harmonicaMap.forEach(n=>{
let d=Math.abs(n.freq-freq);
if(d<min){
min=d;
best=n;
}
});

return best;
}

// ===== BEND DETECT =====
function detectBend(freq, note){
if(!freq || !note) return 0;
return (freq - note.freq);
}

// ===== WAVEFORM =====
function drawWave(){
analyser.getFloatTimeDomainData(dataArray);

wctx.clearRect(0,0,waveCanvas.width,waveCanvas.height);

wctx.beginPath();

for(let i=0;i<dataArray.length;i++){
let x = i / dataArray.length * waveCanvas.width;
let y = (dataArray[i]*50) + waveCanvas.height/2;
if(i===0) wctx.moveTo(x,y);
else wctx.lineTo(x,y);
}

wctx.strokeStyle="lime";
wctx.stroke();
}

// ===== START =====
function start(){
score=0;combo=0;hits=0;total=0;

backingAudio = new Audio(song.audio);
backingAudio.play();

loop();
}

// ===== LOOP =====
function loop(){
let now = backingAudio.currentTime + offset;

ctx.clearRect(0,0,canvas.width,canvas.height);

// lanes
for(let i=0;i<10;i++){
ctx.fillStyle="rgba(255,255,255,0.03)";
ctx.fillRect(i*laneWidth,0,laneWidth,canvas.height);
}

// hit line
ctx.fillStyle="white";
ctx.fillRect(0,hitY,canvas.width,3);

// waveform
drawWave();

// pitch
let freq = getPitch();
let played = detect(freq);

song.notes.forEach(note=>{
let y = hitY - (note.time - now)*speed;
let h = note.duration * speed;

if(y>-200 && y<canvas.height){

let x = (note.hole-1)*laneWidth;

ctx.fillStyle="cyan";
ctx.fillRect(x+10,y-h,laneWidth-20,h);

// hit
let delta = Math.abs(y-hitY);

if(delta<30){
total++;

let result="Miss";

if(played && played.hole===note.hole && played.type===note.type){

let bend = detectBend(freq, note);

score+=100;
combo++;
hits++;

if(Math.abs(bend)<5){
result="Perfect";
}else{
result="Good (bend)";
}

}else{
combo=0;
}

document.getElementById("feedback").innerText=result;
}
}
});

// progress
let progress = (backingAudio.currentTime/backingAudio.duration)*100;
document.getElementById("progress").style.width = progress + "%";

// UI
document.getElementById("score").innerText=score;
document.getElementById("combo").innerText=combo;
document.getElementById("accuracy").innerText =
total?Math.round((hits/total)*100)+"%":"0%";

requestAnimationFrame(loop);
}

initMic();
</script>

</body>
</html>
