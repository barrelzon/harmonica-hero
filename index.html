<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero (Playable Build)</title>

<style>
body {
    margin:0;
    background: radial-gradient(circle at center, #0f0f15, #050507);
    color:white;
    font-family:Arial;
    text-align:center;
}

h2 {
    margin:10px;
}

canvas {
    display:block;
    margin:auto;
    background:#0b0b0f;
    border:2px solid #222;
}

#hud {
    margin-top:10px;
    font-size:18px;
}

#feedback {
    font-size:22px;
    margin-top:5px;
}
</style>
</head>

<body>

<h2>🎵 Harmonica Hero</h2>

<canvas id="gameCanvas" width="700" height="700"></canvas>

<div id="hud">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span>
<div id="feedback"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const laneCount = 10;
const laneWidth = canvas.width / laneCount;

const hitY = canvas.height - 120;
const speed = 300;

let notes = [];
let startTime = 0;

let score = 0;
let combo = 0;

let inputKey = null;

// 🎵 SONG (simple but playable)
const song = [
{hole:4,time:1},
{hole:5,time:1.5},
{hole:6,time:2},
{hole:5,time:2.5},
{hole:4,time:3},
{hole:4,time:3.5},
{hole:5,time:4},
{hole:6,time:4.5},
{hole:5,time:5},
{hole:4,time:5.5}
];

// INIT NOTES
function initNotes(){
    notes = song.map(n => ({
        ...n,
        judged:false,
        hit:false
    }));
}

// KEY INPUT
window.addEventListener("keydown", e=>{
    const k = parseInt(e.key);
    if(!isNaN(k)){
        inputKey = k === 0 ? 10 : k;
    }
});

// START GAME
function start(){
    score = 0;
    combo = 0;
    initNotes();
    startTime = performance.now()/1000;
    loop();
}

start();

// MAIN LOOP
function loop(){
    let now = performance.now()/1000 - startTime;

    drawBackground();
    drawHitLine();

    notes.forEach(note=>{
        let y = hitY - (note.time - now)*speed;

        if(y > -50 && y < canvas.height){
            drawNote(note, y);
            handleHit(note, now);
        }
    });

    inputKey = null;

    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;

    requestAnimationFrame(loop);
}

// DRAW BACKGROUND + LANES
function drawBackground(){
    ctx.fillStyle = "#0a0a0f";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<laneCount;i++){
        let x = i * laneWidth;

        ctx.fillStyle = i%2 ? "#111" : "#151515";
        ctx.fillRect(x,0,laneWidth,canvas.height);

        ctx.strokeStyle="#222";
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }
}

// HIT LINE
function drawHitLine(){
    ctx.shadowBlur = 20;
    ctx.shadowColor = "white";

    ctx.fillStyle="white";
    ctx.fillRect(0,hitY,canvas.width,4);

    ctx.shadowBlur = 0;
}

// DRAW NOTE
function drawNote(note, y){
    let x = (note.hole - 1) * laneWidth;

    let delta = Math.abs(note.time - (performance.now()/1000 - startTime));

    if(delta < 0.1){
        ctx.shadowBlur = 20;
        ctx.shadowColor = "lime";
    } else {
        ctx.shadowBlur = 0;
    }

    let grad = ctx.createLinearGradient(0,y,0,y+20);
    grad.addColorStop(0,"#00f5ff");
    grad.addColorStop(1,"#00a2ff");

    ctx.fillStyle = grad;
    roundRect(ctx, x+10, y, laneWidth-20, 20, 6);
    ctx.fill();

    ctx.shadowBlur = 0;
}

// HIT LOGIC
function handleHit(note, now){
    let delta = Math.abs(note.time - now);

    if(!note.judged && delta < 0.2){

        if(inputKey === note.hole){
            note.judged = true;
            combo++;

            if(delta < 0.07){
                score += 150;
                feedback("Perfect","lime");
            } else {
                score += 100;
                feedback("Good","yellow");
            }

            flash();

        } else if(delta < 0.05){
            // grace window
        } else {
            note.judged = true;
            combo = 0;
            feedback("Miss","red");
        }
    }

    if(!note.judged && now - note.time > 0.25){
        note.judged = true;
        combo = 0;
        feedback("Miss","red");
    }
}

// FEEDBACK
function feedback(text,color){
    const el = document.getElementById("feedback");
    el.innerText = text;
    el.style.color = color;
}

// SCREEN FLASH
function flash(){
    canvas.style.background = "#1a1a1a";
    setTimeout(()=>canvas.style.background="#0b0b0f",50);
}

// ROUNDED RECT
function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}
</script>

</body>
</html>
