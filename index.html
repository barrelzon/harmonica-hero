<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero (Playable Build)</title>
<style>
body {
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas {
    display:block;
    margin:auto;
    background:#111;
}

#hud {
    margin-top:10px;
}

.lane {
    border-right:1px solid #333;
}
</style>
</head>
<body>

<h2>🎵 Harmonica Hero (Playable)</h2>

<canvas id="gameCanvas" width="600" height="700"></canvas>

<div id="hud">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span>
<div id="feedback"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const laneCount = 10;
const laneWidth = canvas.width / laneCount;

const hitY = canvas.height - 120;
const speed = 300;

let notes = [];
let startTime = 0;
let running = false;

let score = 0;
let combo = 0;

// INPUT STATE
let keyPressed = null;

// SONG (TEST)
const song = [
{hole:4,time:1},
{hole:5,time:2},
{hole:6,time:3},
{hole:5,time:4},
{hole:4,time:5},
];

// INIT NOTES
function initNotes() {
    notes = song.map(n => ({
        ...n,
        hit:false,
        judged:false
    }));
}

// INPUT
window.addEventListener("keydown", e => {
    const key = parseInt(e.key);
    if (!isNaN(key)) {
        keyPressed = key === 0 ? 10 : key;
    }
});

// START
function start() {
    score = 0;
    combo = 0;
    initNotes();
    startTime = performance.now() / 1000;
    running = true;
    loop();
}

start();

// LOOP
function loop() {
    if (!running) return;

    let now = performance.now()/1000 - startTime;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // lanes
    for (let i = 0; i < laneCount; i++) {
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fillRect(i * laneWidth, 0, laneWidth, canvas.height);
    }

    // hit line
    ctx.fillStyle = "white";
    ctx.fillRect(0, hitY, canvas.width, 3);

    notes.forEach(note => {
        let y = hitY - (note.time - now) * speed;

        if (y > -50 && y < canvas.height) {
            let x = (note.hole - 1) * laneWidth;

            ctx.fillStyle = note.hit ? "lime" : "cyan";
            ctx.fillRect(x + 10, y, laneWidth - 20, 20);

            let delta = Math.abs(note.time - now);

            if (!note.judged && delta < 0.2) {
                if (keyPressed === note.hole) {
                    note.hit = true;
                    note.judged = true;

                    if (delta < 0.08) {
                        score += 150;
                        combo++;
                        showFeedback("Perfect");
                    } else {
                        score += 100;
                        combo++;
                        showFeedback("Good");
                    }
                }
            }

            // miss
            if (!note.judged && now - note.time > 0.2) {
                note.judged = true;
                combo = 0;
                showFeedback("Miss");
            }
        }
    });

    keyPressed = null;

    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;

    requestAnimationFrame(loop);
}

// FEEDBACK
function showFeedback(text) {
    const el = document.getElementById("feedback");
    el.innerText = text;
    el.style.color =
        text === "Perfect" ? "lime" :
        text === "Good" ? "yellow" :
        "red";
}
</script>

</body>
</html>
