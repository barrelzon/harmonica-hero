<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero Ultimate</title>

<style>
body {
    margin:0;
    background:#050507;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas {
    display:block;
    margin:auto;
    background:#08080c;
}

button {
    padding:10px;
    margin:5px;
    background:#222;
    color:white;
    border:1px solid #444;
}

.hidden { display:none; }

#hud { margin-top:10px; }
#feedback { font-size:24px; }
</style>
</head>

<body>

<h2>🎵 Harmonica Hero Ultimate</h2>

<div id="menu">
    <h3>Select Song</h3>
    <div id="songList"></div>
</div>

<canvas id="gameCanvas" width="700" height="700" class="hidden"></canvas>

<div id="hud" class="hidden">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span> |
Progress: <span id="progressText">0%</span>
<div id="feedback"></div>
</div>

<div id="results" class="hidden">
<h3>Results</h3>
<p id="finalScore"></p>
<button onclick="goMenu()">Back to Menu</button>
</div>

<script>
// ===== BASIC SETUP =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const laneWidth = canvas.width / 10;
const hitY = canvas.height - 120;
const speed = 300;

// ===== GAME STATE =====
let state = "menu"; // menu | game | results

let audio, notes=[], particles=[];
let score=0, combo=0, hits=0;

// ===== SONGS =====
const songs = [
{
name:"Ode to Joy",
audio:"ode.mp3",
notes:[
{hole:4,time:1},{hole:5,time:2},{hole:6,time:3},
{hole:5,time:4},{hole:4,time:5}
]
},
{
name:"Saints",
audio:"saints.mp3",
notes:[
{hole:4,time:1},{hole:5,time:2},{hole:6,time:3}
]
}
];

// ===== BUILD MENU =====
const songList = document.getElementById("songList");

songs.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.name;
b.onclick=()=>startGame(i);
songList.appendChild(b);
});

// ===== MIC =====
let audioCtx, analyser, buf, lastFreq;

async function initMic(){
audioCtx=new AudioContext();
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const src=audioCtx.createMediaStreamSource(stream);

analyser=audioCtx.createAnalyser();
analyser.fftSize=2048;

src.connect(analyser);
buf=new Float32Array(analyser.fftSize);
}

function getPitch(){
analyser.getFloatTimeDomainData(buf);

let bestOffset=-1,bestCorr=0;

for(let o=8;o<800;o++){
let corr=0;
for(let i=0;i<800;i++){
corr+=buf[i]*buf[i+o];
}
corr/=800;

if(corr>bestCorr){
bestCorr=corr;
bestOffset=o;
}
}

if(bestCorr>0.02){
let freq=audioCtx.sampleRate/bestOffset;
if(lastFreq) freq=(freq+lastFreq)/2;
lastFreq=freq;
return freq;
}
return null;
}

function mapFreq(f){
if(!f)return null;
if(f<550)return 4;
if(f<700)return 5;
if(f<900)return 6;
return null;
}

// ===== START GAME =====
async function startGame(i){
await initMic();

notes = songs[i].notes.map(n=>({...n,hit:false}));
audio = new Audio(songs[i].audio);
audio.play();

score=0; combo=0; hits=0;

document.getElementById("menu").classList.add("hidden");
canvas.classList.remove("hidden");
document.getElementById("hud").classList.remove("hidden");

state="game";
loop();
}

// ===== LOOP =====
function loop(){
if(state!=="game") return;

let now = audio.currentTime;

ctx.clearRect(0,0,canvas.width,canvas.height);

// lanes
for(let i=0;i<10;i++){
ctx.fillStyle=i%2?"#0c0c12":"#101018";
ctx.fillRect(i*laneWidth,0,laneWidth,canvas.height);
}

// hit line
ctx.fillStyle="white";
ctx.fillRect(0,hitY,canvas.width,3);

// input
let freq=getPitch();
let input=mapFreq(freq);

// notes
notes.forEach(n=>{
let y=hitY-(n.time-now)*speed;

if(y>-50 && y<canvas.height){
let x=(n.hole-1)*laneWidth;

ctx.fillStyle="#00f5ff";
ctx.fillRect(x+10,y,laneWidth-20,20);

let d=Math.abs(n.time-now);

if(!n.hit && d<0.2){
if(input===n.hole){
n.hit=true;
hits++;
combo++;
score+=100+combo*5;
spawnParticles(x+20,y);
feedback("Perfect");
}else{
n.hit=true;
combo=0;
feedback("Miss");
}
}
}
});

// progress
let last = notes[notes.length-1].time;
let prog = Math.min(100,(now/last)*100);
document.getElementById("progressText").innerText = prog.toFixed(0)+"%";

// particles
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="lime";
ctx.fillRect(p.x,p.y,3,3);
});
particles = particles.filter(p=>p.life>0);

// UI
scoreEl.innerText=score;
comboEl.innerText=combo;

// END
if(now > last+1){
endGame();
}

requestAnimationFrame(loop);
}

// ===== PARTICLES =====
function spawnParticles(x,y){
for(let i=0;i<10;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
life:20
});
}
}

// ===== FEEDBACK =====
function feedback(t){
feedbackEl.innerText=t;
feedbackEl.style.color = t==="Perfect"?"lime":"red";
}

// ===== END =====
function endGame(){
state="results";

canvas.classList.add("hidden");
document.getElementById("hud").classList.add("hidden");

document.getElementById("results").classList.remove("hidden");
document.getElementById("finalScore").innerText =
"Score: "+score+" | Hits: "+hits;
}

// ===== NAV =====
function goMenu(){
document.getElementById("results").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script>

</body>
</html>
