<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero X + Audio</title>
<style>
body {
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas {
    display:block;
    margin:auto;
    background:#111;
}

button {
    margin:5px;
    padding:10px;
    background:#222;
    color:white;
    border:1px solid #444;
}

#progressBar {
    width:80%;
    height:10px;
    background:#222;
    margin:10px auto;
}

#progress {
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>
<body>

<h2>🎵 Harmonica Hero X (Audio)</h2>

<div id="menu"></div>

<canvas id="gameCanvas" width="700" height="700" style="display:none;"></canvas>

<div id="hud" style="display:none;">
<div id="progressBar"><div id="progress"></div></div>
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span> |
Accuracy: <span id="accuracy">0%</span>
<div id="tabDisplay">---</div>
<div id="feedback"></div>
<button onclick="back()">Back</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const hitY = canvas.height - 120;
const laneWidth = canvas.width / 10;
const speed = 240;

let audioCtx, analyser, dataArray;
let backingAudio = null;

let startTime=0;
let running=false;

let score=0,combo=0,hits=0,total=0;

const harmonicaMap = [
{hole:4,type:"blow",freq:523.3},
{hole:4,type:"draw",freq:587.3},
{hole:5,type:"blow",freq:659.3},
{hole:5,type:"draw",freq:698.5},
{hole:6,type:"blow",freq:784.0},
{hole:6,type:"draw",freq:880.0}
];

const songs = [
{
title:"Ode to Joy",
audio:"ode.mp3",
notes:[
{hole:4,type:"blow",time:0,duration:0.6},
{hole:5,type:"blow",time:1,duration:0.6},
{hole:6,type:"blow",time:2,duration:0.6}
]
},
{
title:"Saints",
audio:"saints.mp3",
notes:[
{hole:4,type:"blow",time:0,duration:0.5},
{hole:5,type:"blow",time:1,duration:0.5},
{hole:6,type:"blow",time:2,duration:0.5}
]
}
];

// MENU
const menu=document.getElementById("menu");

songs.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.title;
b.onclick=()=>start(i);
menu.appendChild(b);
});

// MIC
async function initMic(){
audioCtx=new AudioContext();
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const source=audioCtx.createMediaStreamSource(stream);

analyser=audioCtx.createAnalyser();
analyser.fftSize=2048;

source.connect(analyser);
dataArray=new Float32Array(analyser.fftSize);
}

function getPitch(){
analyser.getFloatTimeDomainData(dataArray);

let bestOffset=-1,bestCorrelation=0;

for(let o=8;o<1000;o++){
let c=0;
for(let i=0;i<1000;i++){
c+=dataArray[i]*dataArray[i+o];
}
c/=1000;
if(c>bestCorrelation){
bestCorrelation=c;
bestOffset=o;
}
}

if(bestCorrelation>0.01){
return audioCtx.sampleRate/bestOffset;
}
return null;
}

function detect(freq){
if(!freq)return null;
let best=null,min=999;

harmonicaMap.forEach(n=>{
let d=Math.abs(n.freq-freq);
if(d<min){min=d;best=n;}
});
return best;
}

function tab(n){
return n.type==="blow"?n.hole:"-"+n.hole;
}

// START
function start(i){
const song=songs[i];

document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("hud").style.display="block";

score=0;combo=0;hits=0;total=0;

// AUDIO
backingAudio = new Audio(song.audio);
backingAudio.currentTime = 0;
backingAudio.play();

startTime=performance.now()/1000;
running=true;

loop(song);
}

function back(){
running=false;
if(backingAudio) backingAudio.pause();

canvas.style.display="none";
document.getElementById("hud").style.display="none";
document.getElementById("menu").style.display="block";
}

function loop(song){
if(!running)return;

let now = backingAudio ? backingAudio.currentTime : (performance.now()/1000-startTime);

ctx.clearRect(0,0,canvas.width,canvas.height);

// lanes
for(let i=0;i<10;i++){
ctx.fillStyle="rgba(255,255,255,0.03)";
ctx.fillRect(i*laneWidth,0,laneWidth,canvas.height);
}

// hit line
ctx.fillStyle="white";
ctx.fillRect(0,hitY,canvas.width,3);

let freq=getPitch();
let played=detect(freq);

let display="---";

song.notes.forEach(note=>{
let y=hitY-(note.time-now)*speed;
let h=note.duration*speed;

if(y>-200 && y<canvas.height){

let x=(note.hole-1)*laneWidth;

ctx.fillStyle="cyan";
ctx.fillRect(x+10,y-h,laneWidth-20,h);

if(Math.abs(y-hitY)<20){
ctx.fillStyle="lime";
ctx.fillRect(x+10,y-h,laneWidth-20,h);
}

let delta=Math.abs(y-hitY);

if(delta<30){
display=tab(note);
total++;

if(played && played.hole===note.hole && played.type===note.type){
hits++;combo++;score+=100;
document.getElementById("feedback").innerText="Hit!";
}else{
combo=0;
document.getElementById("feedback").innerText="Miss";
}
}
}
});

document.getElementById("tabDisplay").innerText=display;

// progress
if(backingAudio){
let progress = (backingAudio.currentTime/backingAudio.duration)*100;
document.getElementById("progress").style.width=progress+"%";
}

document.getElementById("score").innerText=score;
document.getElementById("combo").innerText=combo;
document.getElementById("accuracy").innerText =
total?Math.round((hits/total)*100)+"%":"0%";

requestAnimationFrame(()=>loop(song));
}

initMic();
</script>

</body>
</html>
