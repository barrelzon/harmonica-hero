<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero (Accurate + Content)</title>
<style>
body {
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}
canvas {
    display:block;
    margin:auto;
    background:#111;
}
button {
    margin:5px;
    padding:10px;
}
</style>
</head>
<body>

<h2>🎵 Harmonica Hero</h2>

<div id="menu"></div>

<canvas id="gameCanvas" width="700" height="700" style="display:none;"></canvas>

<div id="hud" style="display:none;">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span>
<div id="feedback"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const laneCount = 10;
const laneWidth = canvas.width / laneCount;
const hitY = canvas.height - 120;
const speed = 260;

let audioCtx, analyser, buffer;
let running=false;

let score=0, combo=0;

// 🎵 SONG LIBRARY
const songs = [
{
title:"Ode to Joy",
notes:[
{hole:4,time:1},{hole:4,time:2},{hole:5,time:3},{hole:6,time:4}
]
},
{
title:"Twinkle",
notes:[
{hole:4,time:1},{hole:4,time:2},{hole:5,time:3},{hole:5,time:4}
]
},
{
title:"Mary Lamb",
notes:[
{hole:5,time:1},{hole:4,time:2},{hole:4,time:3},{hole:5,time:4}
]
},
{
title:"Saints",
notes:[
{hole:4,time:1},{hole:5,time:2},{hole:6,time:3}
]
},
{
title:"Scale",
notes:Array.from({length:6},(_,i)=>({hole:4+i,time:i+1}))
}
];

// 🎤 MIC INIT
async function initMic(){
audioCtx = new AudioContext();
const stream = await navigator.mediaDevices.getUserMedia({audio:true});
const source = audioCtx.createMediaStreamSource(stream);

analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;

source.connect(analyser);
buffer = new Float32Array(analyser.fftSize);
}

// 🎧 BETTER PITCH DETECTION
function getPitch(){
analyser.getFloatTimeDomainData(buffer);

let bestOffset=-1, bestCorr=0;

for(let offset=8; offset<1000; offset++){
let corr=0;
for(let i=0;i<1000;i++){
corr += buffer[i] * buffer[i+offset];
}
corr/=1000;

if(corr>bestCorr){
bestCorr=corr;
bestOffset=offset;
}
}

if(bestCorr > 0.03){
return audioCtx.sampleRate / bestOffset;
}
return null;
}

// 🎵 HARMONICA MAP
const harmonica = [
{hole:4,freq:523},{hole:5,freq:659},{hole:6,freq:784}
];

function detectHole(freq){
if(!freq) return null;

let best=null, min=999;

harmonica.forEach(n=>{
let d=Math.abs(n.freq-freq);
if(d<min){min=d;best=n;}
});

return best?.hole;
}

// 🎮 START
let notes=[];
let startTime=0;
let currentSong=null;

function startSong(index){
currentSong = songs[index];

document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("hud").style.display="block";

notes = currentSong.notes.map(n=>({...n,judged:false}));

score=0;combo=0;
startTime = performance.now()/1000;
running=true;

loop();
}

// 🎮 LOOP
function loop(){
if(!running) return;

let now = performance.now()/1000 - startTime;

ctx.clearRect(0,0,canvas.width,canvas.height);

// lanes
for(let i=0;i<laneCount;i++){
ctx.fillStyle="rgba(255,255,255,0.03)";
ctx.fillRect(i*laneWidth,0,laneWidth,canvas.height);
}

// hit line
ctx.fillStyle="white";
ctx.fillRect(0,hitY,canvas.width,3);

let freq = getPitch();
let hole = detectHole(freq);

notes.forEach(note=>{
let y = hitY - (note.time-now)*speed;

if(y>-50 && y<canvas.height){
let x=(note.hole-1)*laneWidth;

ctx.fillStyle="cyan";
ctx.fillRect(x+10,y,laneWidth-20,20);

let delta=Math.abs(note.time-now);

if(!note.judged && delta<0.2){

if(hole===note.hole){
note.judged=true;
combo++;

if(delta<0.08){
score+=150;
show("Perfect");
}else{
score+=100;
show("Good");
}

}else{
note.judged=true;
combo=0;
show("Miss");
}
}

if(!note.judged && now-note.time>0.25){
note.judged=true;
combo=0;
show("Miss");
}
}
});

document.getElementById("score").innerText=score;
document.getElementById("combo").innerText=combo;

requestAnimationFrame(loop);
}

// UI
function show(text){
const el=document.getElementById("feedback");
el.innerText=text;
el.style.color =
text==="Perfect"?"lime":
text==="Good"?"yellow":"red";
}

// MENU
const menu=document.getElementById("menu");

songs.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.title;
b.onclick=()=>startSong(i);
menu.appendChild(b);
});

initMic();
</script>

</body>
</html>
