<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero (Playable + Mic)</title>
<style>
body {
    margin:0;
    background:linear-gradient(#0b0b0f,#050507);
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas {
    display:block;
    margin:auto;
    background:#111;
}

#hud {
    margin-top:10px;
    font-size:18px;
}
</style>
</head>
<body>

<h2>🎵 Harmonica Hero</h2>

<canvas id="gameCanvas" width="700" height="700"></canvas>

<div id="hud">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span>
<div id="feedback"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const laneCount = 10;
const laneWidth = canvas.width / laneCount;
const hitY = canvas.height - 120;
const speed = 280;

let notes = [];
let startTime = 0;
let running = false;

let score = 0;
let combo = 0;

let inputHole = null;

// 🎵 SIMPLE SONG
const song = [
{hole:4,time:1},
{hole:5,time:2},
{hole:6,time:3},
{hole:5,time:4},
{hole:4,time:5},
];

// 🎤 MIC
let audioCtx, analyser, dataArray;
let lastPitch = null;

async function initMic(){
audioCtx = new AudioContext();
const stream = await navigator.mediaDevices.getUserMedia({audio:true});
const source = audioCtx.createMediaStreamSource(stream);

analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;

source.connect(analyser);
dataArray = new Float32Array(analyser.fftSize);
}

// smoother pitch
function getPitch(){
analyser.getFloatTimeDomainData(dataArray);

let bestOffset=-1, bestCorr=0;

for(let o=8;o<800;o++){
let corr=0;
for(let i=0;i<800;i++){
corr+=dataArray[i]*dataArray[i+o];
}
corr/=800;

if(corr>bestCorr){
bestCorr=corr;
bestOffset=o;
}
}

if(bestCorr>0.02){
let freq = audioCtx.sampleRate / bestOffset;

// smoothing
if(lastPitch){
freq = (freq + lastPitch) / 2;
}
lastPitch = freq;

return freq;
}
return null;
}

// map freq → hole
function freqToHole(freq){
if(!freq) return null;

// VERY simplified mapping (stable > accurate)
if(freq < 550) return 4;
if(freq < 700) return 5;
if(freq < 900) return 6;
return null;
}

// 🎹 KEYBOARD BACKUP
window.addEventListener("keydown", e=>{
let k = parseInt(e.key);
if(!isNaN(k)){
inputHole = k===0?10:k;
}
});

// INIT
function initNotes(){
notes = song.map(n=>({
...n,
hit:false,
judged:false
}));
}

// START
async function start(){
await initMic();

score=0;
combo=0;

initNotes();

startTime = performance.now()/1000;
running = true;

loop();
}

start();

// LOOP
function loop(){
if(!running) return;

let now = performance.now()/1000 - startTime;

ctx.clearRect(0,0,canvas.width,canvas.height);

// lanes
for(let i=0;i<laneCount;i++){
let grad = ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#111");
grad.addColorStop(1,"#222");

ctx.fillStyle = grad;
ctx.fillRect(i*laneWidth,0,laneWidth,canvas.height);
}

// hit line glow
ctx.fillStyle="white";
ctx.fillRect(0,hitY,canvas.width,4);

// mic input
let freq = getPitch();
let micHole = freqToHole(freq);

// choose input (mic first)
let activeInput = micHole || inputHole;

notes.forEach(note=>{
let y = hitY - (note.time - now)*speed;

if(y>-50 && y<canvas.height){

let x = (note.hole-1)*laneWidth;

// glow if close
let delta = Math.abs(note.time - now);
let glow = delta < 0.1;

ctx.fillStyle = glow ? "lime" : "cyan";
ctx.fillRect(x+10,y,laneWidth-20,20);

// HIT
if(!note.judged && delta < 0.2){

if(activeInput === note.hole){
note.hit = true;
note.judged = true;

if(delta < 0.07){
score+=150;
combo++;
showFeedback("Perfect");
}else{
score+=100;
combo++;
showFeedback("Good");
}

}else if(delta < 0.05){
// slight forgiveness window
}else{
note.judged = true;
combo = 0;
showFeedback("Miss");
}
}

// MISS fallback
if(!note.judged && now - note.time > 0.25){
note.judged = true;
combo = 0;
showFeedback("Miss");
}
}
});

inputHole = null;

document.getElementById("score").innerText = score;
document.getElementById("combo").innerText = combo;

requestAnimationFrame(loop);
}

// FEEDBACK
function showFeedback(text){
const el = document.getElementById("feedback");
el.innerText = text;

el.style.color =
text==="Perfect"?"lime":
text==="Good"?"yellow":
"red";
}
</script>

</body>
</html>
