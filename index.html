<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero</title>

<style>
body {
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas {
    display:block;
    margin:auto;
    background:#0b0b0f;
}

button {
    padding:10px 20px;
    margin:5px;
    background:#222;
    color:white;
    border:1px solid #444;
    cursor:pointer;
}

#menu {
    padding:20px;
}

#hud {
    margin-top:10px;
}
</style>
</head>

<body>

<h2>🎵 Harmonica Hero</h2>

<div id="menu">
    <h3>Select Song</h3>
    <div id="songList"></div>
</div>

<canvas id="gameCanvas" width="700" height="700" style="display:none;"></canvas>

<div id="hud" style="display:none;">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span>
<div id="feedback"></div>

<br>
<button onclick="restart()">Restart</button>
<button onclick="backToMenu()">Menu</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const laneCount = 10;
const laneWidth = canvas.width / laneCount;
const hitY = canvas.height - 120;
const speed = 300;

let notes = [];
let startTime = 0;
let running = false;

let score = 0;
let combo = 0;
let inputKey = null;

// 🎵 SONG LIBRARY
const songs = [
{
    name:"Easy Scale",
    data:[
        {hole:4,time:1},
        {hole:5,time:2},
        {hole:6,time:3},
        {hole:5,time:4},
        {hole:4,time:5}
    ]
},
{
    name:"Faster Pattern",
    data:[
        {hole:4,time:1},
        {hole:5,time:1.5},
        {hole:6,time:2},
        {hole:5,time:2.5},
        {hole:4,time:3}
    ]
}
];

// BUILD MENU
const songList = document.getElementById("songList");

songs.forEach((s,i)=>{
    const btn = document.createElement("button");
    btn.innerText = s.name;
    btn.onclick = ()=>startGame(i);
    songList.appendChild(btn);
});

// INPUT
window.addEventListener("keydown", e=>{
    const k = parseInt(e.key);
    if(!isNaN(k)){
        inputKey = k === 0 ? 10 : k;
    }
});

// START GAME
function startGame(index){
    document.getElementById("menu").style.display="none";
    canvas.style.display="block";
    document.getElementById("hud").style.display="block";

    score = 0;
    combo = 0;

    notes = songs[index].data.map(n=>({
        ...n,
        judged:false
    }));

    startTime = performance.now()/1000;
    running = true;

    loop();
}

// LOOP
function loop(){
    if(!running) return;

    let now = performance.now()/1000 - startTime;

    drawBackground();
    drawHitLine();

    notes.forEach(note=>{
        let y = hitY - (note.time-now)*speed;

        if(y>-50 && y<canvas.height){
            drawNote(note, y);
            handleHit(note, now);
        }
    });

    inputKey = null;

    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;

    requestAnimationFrame(loop);
}

// DRAW
function drawBackground(){
    ctx.fillStyle="#0a0a0f";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<laneCount;i++){
        let x=i*laneWidth;
        ctx.fillStyle = i%2 ? "#111" : "#151515";
        ctx.fillRect(x,0,laneWidth,canvas.height);
    }
}

function drawHitLine(){
    ctx.fillStyle="white";
    ctx.fillRect(0,hitY,canvas.width,4);
}

function drawNote(note,y){
    let x=(note.hole-1)*laneWidth;
    ctx.fillStyle="cyan";
    ctx.fillRect(x+10,y,laneWidth-20,20);
}

// HIT LOGIC
function handleHit(note, now){
    let delta=Math.abs(note.time-now);

    if(!note.judged && delta<0.2){
        if(inputKey===note.hole){
            note.judged=true;
            combo++;

            if(delta<0.07){
                score+=150;
                feedback("Perfect","lime");
            } else {
                score+=100;
                feedback("Good","yellow");
            }
        } else {
            note.judged=true;
            combo=0;
            feedback("Miss","red");
        }
    }

    if(!note.judged && now-note.time>0.25){
        note.judged=true;
        combo=0;
        feedback("Miss","red");
    }
}

// UI
function feedback(text,color){
    const el=document.getElementById("feedback");
    el.innerText=text;
    el.style.color=color;
}

function restart(){
    startTime = performance.now()/1000;
    score = 0;
    combo = 0;
    notes.forEach(n=>n.judged=false);
}

function backToMenu(){
    running=false;
    canvas.style.display="none";
    document.getElementById("hud").style.display="none";
    document.getElementById("menu").style.display="block";
}
</script>

</body>
</html>
