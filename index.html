<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonica Hero X</title>
<style>
body {
    margin:0;
    background:linear-gradient(#0b0b0f,#050507);
    color:white;
    font-family:Arial;
    text-align:center;
}

#menu {
    padding:20px;
}

button {
    margin:5px;
    padding:10px 15px;
    background:#222;
    color:white;
    border:1px solid #444;
    cursor:pointer;
}

button:hover {
    background:#555;
}

canvas {
    display:block;
    margin:auto;
    background:#111;
}

#hud {
    margin-top:10px;
}

#tabDisplay {
    font-size:30px;
    margin-top:10px;
}

#progressBar {
    width:80%;
    height:10px;
    background:#222;
    margin:10px auto;
}

#progress {
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>
<body>

<div id="menu">
    <h2>🎵 Harmonica Hero X</h2>
    <div id="songList"></div>
</div>

<canvas id="gameCanvas" width="700" height="700" style="display:none;"></canvas>

<div id="hud" style="display:none;">
<div id="progressBar"><div id="progress"></div></div>

Score: <span id="score">0</span> |
Combo: <span id="combo">0</span> |
Accuracy: <span id="accuracy">0%</span>

<div id="tabDisplay">---</div>
<div id="feedback">Ready</div>

<button onclick="backToMenu()">Back</button>
</div>

<script>
// ===== CANVAS =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const hitY = canvas.height - 120;
const laneWidth = canvas.width / 10;
const speed = 240;

// ===== AUDIO =====
let audioCtx, analyser, dataArray;

// ===== STATE =====
let currentSong=null;
let startTime=0;
let running=false;

let score=0, combo=0, hits=0, total=0;

// ===== HARMONICA MAP =====
const harmonicaMap = [
{hole:4,type:"blow",freq:523.3},
{hole:4,type:"draw",freq:587.3},
{hole:5,type:"blow",freq:659.3},
{hole:5,type:"draw",freq:698.5},
{hole:6,type:"blow",freq:784.0},
{hole:6,type:"draw",freq:880.0}
];

// ===== SONGS =====
const songs = [
{
title:"Ode to Joy",
notes:[
{hole:4,type:"blow",time:0,duration:0.6},
{hole:4,type:"blow",time:0.6,duration:0.6},
{hole:5,type:"blow",time:1.2,duration:0.6},
{hole:6,type:"blow",time:1.8,duration:0.6},
{hole:6,type:"blow",time:2.4,duration:0.6},
{hole:5,type:"blow",time:3,duration:0.6},
{hole:4,type:"blow",time:3.6,duration:1}
]
},
{
title:"When The Saints",
notes:[
{hole:4,type:"blow",time:0,duration:0.5},
{hole:5,type:"blow",time:0.5,duration:0.5},
{hole:6,type:"blow",time:1,duration:0.5},
{hole:5,type:"blow",time:1.5,duration:0.5}
]
}
];

// ===== MENU =====
const songListDiv=document.getElementById("songList");

songs.forEach((s,i)=>{
let btn=document.createElement("button");
btn.innerText=s.title;
btn.onclick=()=>startSong(i);
songListDiv.appendChild(btn);
});

// ===== MIC =====
async function initMic(){
audioCtx=new AudioContext();
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const source=audioCtx.createMediaStreamSource(stream);

analyser=audioCtx.createAnalyser();
analyser.fftSize=2048;

source.connect(analyser);
dataArray=new Float32Array(analyser.fftSize);
}

function getPitch(){
analyser.getFloatTimeDomainData(dataArray);

let bestOffset=-1,bestCorrelation=0;

for(let offset=8;offset<1000;offset++){
let corr=0;
for(let i=0;i<1000;i++){
corr+=dataArray[i]*dataArray[i+offset];
}
corr/=1000;

if(corr>bestCorrelation){
bestCorrelation=corr;
bestOffset=offset;
}
}

if(bestCorrelation>0.01){
return audioCtx.sampleRate/bestOffset;
}
return null;
}

function detectNote(freq){
if(!freq)return null;

let best=null,min=999;

for(let n of harmonicaMap){
let d=Math.abs(n.freq-freq);
if(d<min){
min=d;
best=n;
}
}
return best;
}

// ===== UTIL =====
function tab(n){
return n.type==="blow"?n.hole:"-"+n.hole;
}

// ===== GAME =====
function startSong(i){
currentSong=songs[i];

document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("hud").style.display="block";

score=0;combo=0;hits=0;total=0;

startTime=performance.now()/1000;
running=true;

loop();
}

function backToMenu(){
running=false;
canvas.style.display="none";
document.getElementById("hud").style.display="none";
document.getElementById("menu").style.display="block";
}

function loop(){
if(!running)return;

let now=performance.now()/1000-startTime;

ctx.clearRect(0,0,canvas.width,canvas.height);

// lanes
for(let i=0;i<10;i++){
ctx.fillStyle="rgba(255,255,255,0.03)";
ctx.fillRect(i*laneWidth,0,laneWidth,canvas.height);
}

// hit line
ctx.fillStyle="white";
ctx.fillRect(0,hitY,canvas.width,3);

let freq=getPitch();
let played=detectNote(freq);

let display="---";

currentSong.notes.forEach(note=>{
let y=hitY-(note.time-now)*speed;
let h=note.duration*speed;

if(y>-200 && y<canvas.height){

let x=(note.hole-1)*laneWidth;

// note body
ctx.fillStyle="cyan";
ctx.fillRect(x+10,y-h,laneWidth-20,h);

// glow near hit
if(Math.abs(y-hitY)<20){
ctx.fillStyle="lime";
ctx.fillRect(x+10,y-h,laneWidth-20,h);
}

let delta=Math.abs(y-hitY);

if(delta<30){
display=tab(note);

total++;

let result="Miss";

if(played && played.hole===note.hole && played.type===note.type){
hits++;
combo++;
score+= (delta<10?150:100);
result = delta<10?"Perfect":"Good";
}else{
combo=0;
result="Wrong ("+(played?tab(played):"none")+")";
}

document.getElementById("feedback").innerText=result;
}
}
});

document.getElementById("tabDisplay").innerText=display;

// progress
let lastTime=currentSong.notes[currentSong.notes.length-1].time;
let progress=(now/lastTime)*100;
document.getElementById("progress").style.width=Math.min(progress,100)+"%";

document.getElementById("score").innerText=score;
document.getElementById("combo").innerText=combo;
document.getElementById("accuracy").innerText=
total?Math.round((hits/total)*100)+"%":"0%";

requestAnimationFrame(loop);
}

initMic();
</script>

</body>
</html>
